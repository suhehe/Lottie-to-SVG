<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 90 90" width="100%" height="100%">
  <defs>
    <style>
      <![CDATA[
      /* 强制所有图层的中心锚点为左上角，严格对齐 Lottie 原生 0,0 坐标系 */
      g { transform-origin: 0 0; }
      
      :root {
        /* 动画总时长 105帧 / 30fps = 3.5s */
        --duration: 3.5s;
      }

      /* =======================================
         星星1号 (主星 Sub 19，拖影 Sub 16) 
         ======================================= */
      .s1-pos { animation: s1-pos var(--duration) infinite; }
      .s1-scale { animation: s1-scale var(--duration) infinite; }
      .s1-squash { animation: s1-squash var(--duration) infinite; }
      .s1-color { animation: s1-color var(--duration) infinite; }

      @keyframes s1-pos {
        0%, 7.143% { transform: translate(50px, 53.5px); animation-timing-function: cubic-bezier(0.333, 0.361, 0.521, 1); }
        14.286% { transform: translate(69.938px, 65.562px); animation-timing-function: cubic-bezier(0.503, 0, 0.452, 1); }
        25.238% { transform: translate(46.75px, 51.125px); animation-timing-function: cubic-bezier(0.333, 0.333, 0.833, 0.833); }
        33.333%, 35.714% { transform: translate(50px, 53.5px); animation-timing-function: cubic-bezier(0.333, 0.403, 0.521, 1); }
        42.857% { transform: translate(61.438px, 60.938px); animation-timing-function: cubic-bezier(0.503, 0, 0.467, 1); }
        54.286% { transform: translate(48.25px, 52.188px); animation-timing-function: cubic-bezier(0.333, 0, 0.667, 1); }
        66.190%, 100% { transform: translate(50px, 53.5px); }
      }
      @keyframes s1-scale {
        0%, 7.143% { transform: scale(1); animation-timing-function: cubic-bezier(0.333, 0, 0.667, 1); }
        14.286% { transform: scale(1.19); animation-timing-function: cubic-bezier(0.333, 0, 0.667, 1); }
        21.429%, 35.714% { transform: scale(1); animation-timing-function: cubic-bezier(0.333, 0, 0.667, 1); }
        42.857% { transform: scale(1.08); animation-timing-function: cubic-bezier(0.333, 0, 0.667, 1); }
        50.000%, 100% { transform: scale(1); }
      }
      @keyframes s1-squash {
        0%, 7.143% { transform: scale(1, 1); animation-timing-function: cubic-bezier(0.333, 0, 0.667, 1); }
        13.810% { transform: scale(0.77, 1); }
        14.762% { transform: scale(0.77, 1); animation-timing-function: cubic-bezier(0.333, 0, 0.667, 1); }
        21.429%, 35.714% { transform: scale(1, 1); animation-timing-function: cubic-bezier(0.333, 0, 0, 1); }
        42.857% { transform: scale(0.23, 1); animation-timing-function: cubic-bezier(0.333, 0, 0.667, 1); }
        50.000%, 100% { transform: scale(1, 1); }
      }
      @keyframes s1-color {
        0%, 35.714% { fill: #824ff1; animation-timing-function: cubic-bezier(0.333, 0, 0.667, 1); }
        42.857% { fill: #b495f5; animation-timing-function: cubic-bezier(0.333, 0, 0.667, 1); }
        50.000%, 100% { fill: #824ff1; }
      }

      /* =======================================
         星星2号 (主星 Sub 18，拖影 Sub 15) 
         ======================================= */
      .s2-pos { animation: s2-pos var(--duration) infinite; }
      .s2-scale { animation: s2-scale var(--duration) infinite; }
      .s2-squash { animation: s2-squash var(--duration) infinite; }
      .s2-color { animation: s2-color var(--duration) infinite; }

      @keyframes s2-pos {
        0%, 21.429% { transform: translate(29px, 36px); animation-timing-function: cubic-bezier(0.315, 0, 0.428, 1); }
        28.571% { transform: translate(10.75px, 25.75px); animation-timing-function: cubic-bezier(0.552, 0, 0.294, 1); }
        39.048% { transform: translate(31.375px, 37.75px); animation-timing-function: cubic-bezier(0.302, 0.032, 0.613, 0.959); }
        48.095%, 50.000% { transform: translate(29px, 36px); animation-timing-function: cubic-bezier(0.6, 0, 0.428, 1); }
        57.143% { transform: translate(20px, 29.75px); animation-timing-function: cubic-bezier(0.358, 0, 0.541, 1); }
        68.095% { transform: translate(31.625px, 37.625px); animation-timing-function: cubic-bezier(0.333, 0, 0.667, 1); }
        80.952%, 100% { transform: translate(29px, 36px); }
      }
      @keyframes s2-scale {
        0%, 21.429% { transform: scale(0.6); animation-timing-function: cubic-bezier(0.333, 0, 0.667, 1); }
        28.571% { transform: scale(0.82); animation-timing-function: cubic-bezier(0.297, 0, 0.667, 1); }
        35.714%, 50.000% { transform: scale(0.6); animation-timing-function: cubic-bezier(0.333, 0, 0.667, 1); }
        57.143% { transform: scale(0.7); animation-timing-function: cubic-bezier(0.333, 0, 0.667, 1); }
        64.286%, 100% { transform: scale(0.6); }
      }
      @keyframes s2-squash {
        0%, 21.429% { transform: scale(1, 1); animation-timing-function: cubic-bezier(1, 0, 0.667, 1); }
        28.571% { transform: scale(0.27, 1); animation-timing-function: cubic-bezier(0.333, 0, 0, 1); }
        35.714%, 50.000% { transform: scale(1, 1); animation-timing-function: cubic-bezier(1, 0, 0.667, 1); }
        57.143% { transform: scale(0.27, 1); animation-timing-function: cubic-bezier(0.333, 0, 0, 1); }
        64.286%, 100% { transform: scale(1, 1); }
      }
      @keyframes s2-color {
        0%, 21.429% { fill: #b495f5; animation-timing-function: cubic-bezier(0.333, 0, 0.667, 1); }
        28.571% { fill: #824ff1; animation-timing-function: cubic-bezier(0.185, 0, 0.833, 1); }
        35.714%, 50.000% { fill: #b495f5; animation-timing-function: cubic-bezier(0.333, 0, 0.667, 1); }
        57.143% { fill: #824ff1; animation-timing-function: cubic-bezier(0.333, 0, 0.667, 1); }
        64.286%, 100% { fill: #b495f5; }
      }

      /* =======================================
         星星3号 (主星 Sub 17，拖影 Sub 14) 
         ======================================= */
      .s3-pos { animation: s3-pos var(--duration) infinite; }
      .s3-scale { animation: s3-scale var(--duration) infinite; }
      .s3-squash { animation: s3-squash var(--duration) infinite; }
      .s3-color { animation: s3-color var(--duration) infinite; }

      @keyframes s3-pos {
        0%, 38.095% { transform: translate(46.5px, 22px); animation-timing-function: cubic-bezier(0.333, 0.178, 0.667, 1); }
        45.238% { transform: translate(61.5px, 13.25px); animation-timing-function: cubic-bezier(0.69, 0, 0.288, 1); }
        56.190% { transform: translate(45.062px, 22.812px); animation-timing-function: cubic-bezier(0.752, 0, 0.387, 1); }
        67.143% { transform: translate(47.125px, 21.625px); animation-timing-function: cubic-bezier(0.333, 0, 0.667, 1); }
        72.381%, 100% { transform: translate(46.5px, 22px); }
      }
      @keyframes s3-scale {
        0%, 38.095% { transform: scale(0.3); animation-timing-function: cubic-bezier(0.333, 0, 0.667, 1); }
        45.238% { transform: scale(0.6); animation-timing-function: cubic-bezier(0.333, 0, 0.667, 1); }
        52.381%, 100% { transform: scale(0.3); }
      }
      @keyframes s3-squash {
        0%, 38.095% { transform: scale(1, 1); animation-timing-function: cubic-bezier(0.693, 0, 0.321, 1); }
        45.238% { transform: scale(0.22, 1); animation-timing-function: cubic-bezier(0.333, 0, 0.667, 1); }
        52.381%, 100% { transform: scale(1, 1); }
      }
      @keyframes s3-color {
        0%, 38.095% { fill: #d9cafa; animation-timing-function: cubic-bezier(0.333, 0, 0.667, 1); }
        45.238% { fill: #824ff1; animation-timing-function: cubic-bezier(0.333, 0, 0.667, 1); }
        52.381%, 100% { fill: #d9cafa; }
      }

      /* =======================================
         背景流动炫彩渐变与透明度控制
         ======================================= */
      .grad-opacity { animation: grad-opacity var(--duration) infinite; }
      .grad-scroll { animation: grad-scroll var(--duration) infinite; }

      @keyframes grad-opacity {
        0%, 42.857% { opacity: 0; }
        50.000%, 80% { opacity: 1; }
        99.524%, 100% { opacity: 0; }
      }
      @keyframes grad-scroll {
        0% { transform: translate(-147px, 0); animation-timing-function: linear; }
        42.857% { transform: translate(0, 0); animation-timing-function: linear; }
        43.928% { transform: translate(-147px, 0); animation-timing-function: linear; }
        85.714%, 100% { transform: translate(0, 0); }
      }
      ]]>
    </style>

    <linearGradient id="iridescent-grad" spreadMethod="pad" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="384" y2="108">
      <stop offset="0%" stop-color="#6e73f8"></stop>
      <stop offset="12%" stop-color="#ed9eff"></stop>
      <stop offset="25%" stop-color="#88a0ff"></stop>
      <stop offset="38%" stop-color="#ed9eff"></stop>
      <stop offset="52%" stop-color="#b975e9"></stop>
      <stop offset="64%" stop-color="#ed9eff"></stop>
      <stop offset="76%" stop-color="#88a0ff"></stop>
      <stop offset="88%" stop-color="#ed9eff"></stop>
      <stop offset="100%" stop-color="#6e73f8"></stop>
    </linearGradient>

    <!-- 精准提取：瘦长锐利的主星星形状 (Main Star) -->
    <path id="main-star" d="M1.1699999570846558,-18.106000900268555 C1.0399999618530273,-18.764999389648438 0.5649999976158142,-19.25 0,-19.25 C-0.5649999976158142,-19.25 -1.0410000085830688,-18.763999938964844 -1.1710000038146973,-18.104999542236328 C-1.1710000038146973,-18.104999542236328 -1.690000057220459,-15.477999687194824 -1.690000057220459,-15.477999687194824 C-2.4700000286102295,-11.531999588012695 -2.450000047683716,-9.557999610900879 -3.1730000972747803,-7.956999778747559 C-3.812999963760376,-6.541999816894531 -6.375,-1.562000036239624 -6.375,0 C-6.375,1.562000036239624 -3.812999963760376,6.541999816894531 -3.1730000972747803,7.956999778747559 C-2.450000047683716,9.557999610900879 -2.4700000286102295,11.531999588012695 -1.690000057220459,15.477999687194824 C-1.690000057220459,15.477999687194824 -1.1710000038146973,18.104000091552734 -1.1710000038146973,18.104000091552734 C-1.0410000085830688,18.76300048828125 -0.5649999976158142,19.25 0,19.25 C0.5649999976158142,19.25 1.0399999618530273,18.763999938964844 1.1699999570846558,18.104999542236328 C1.1699999570846558,18.104999542236328 1.690000057220459,15.477999687194824 1.690000057220459,15.477999687194824 C2.4700000286102295,11.531999588012695 2.450000047683716,9.557999610900879 3.1730000972747803,7.956999778747559 C3.812999963760376,6.541999816894531 6.375,1.687999963760376 6.375,0 C6.375,-1.687999963760376 3.812999963760376,-6.541999816894531 3.1730000972747803,-7.956999778747559 C2.450000047683716,-9.557999610900879 2.4700000286102295,-11.531999588012695 1.690000057220459,-15.477999687194824 C1.690000057220459,-15.477999687194824 1.1699999570846558,-18.106000900268555 1.1699999570846558,-18.106000900268555z" />
    
    <!-- 精准提取：用于产生残影形变的宽胖拖影形状 (Trail Star) -->
    <path id="trail-star" d="M1.403,-18.106 C1.247,-18.765 0.677,-19.25 0,-19.25 C-0.678,-19.25 -1.249,-18.764 -1.405,-18.105 C-1.405,-18.105 -2.027,-15.478 -2.027,-15.478 C-2.963,-11.532 -3.43,-9.558 -4.443,-7.957 C-5.339,-6.542 -6.538,-5.342 -7.953,-4.446 C-9.553,-3.433 -11.527,-2.964 -15.473,-2.028 C-15.473,-2.028 -18.105,-1.404 -18.105,-1.404 C-18.764,-1.248 -19.25,-0.678 -19.25,0 C-19.25,0.677 -18.765,1.247 -18.106,1.403 C-18.106,1.403 -15.473,2.028 -15.473,2.028 C-11.527,2.964 -9.553,3.433 -7.953,4.446 C-6.538,5.342 -5.339,6.542 -4.443,7.957 C-3.43,9.558 -2.963,11.532 -2.027,15.478 C-2.027,15.478 -1.405,18.104 -1.405,18.104 C-1.249,18.763 -0.678,19.25 0,19.25 C0.677,19.25 1.248,18.764 1.404,18.105 C1.404,18.105 2.027,15.478 2.027,15.478 C2.963,11.532 3.43,9.558 4.443,7.957 C5.339,6.542 6.538,5.342 7.953,4.446 C9.553,3.433 11.527,2.964 15.473,2.028 C15.473,2.028 18.105,1.403 18.105,1.403 C18.764,1.247 19.25,0.677 19.25,0 C19.25,-0.678 18.762,-1.249 18.103,-1.405 C18.103,-1.405 15.473,-2.028 15.473,-2.028 C11.527,-2.964 9.553,-3.433 7.953,-4.446 C6.538,-5.342 5.339,-6.542 4.443,-7.957 C3.43,-9.558 2.963,-11.532 2.027,-15.478 C2.027,-15.478 1.403,-18.106 1.403,-18.106 Z" />

    <!-- 合并动画区：共享 Scale 和 Position，但在内部拆分主星星与拖影星星 -->
    <g id="all-animated-stars">
      <!-- S1: 底部放拥有 Squash (X轴弹性) 的 trail-star，上方放没有 Squash 保持形状的 main-star -->
      <g class="s1-pos">
        <g class="s1-scale">
          <g class="s1-squash"><use href="#trail-star" xlink:href="#trail-star" class="s1-color" /></g>
          <use href="#main-star" xlink:href="#main-star" class="s1-color" />
        </g>
      </g>
      <!-- S2 -->
      <g class="s2-pos">
        <g class="s2-scale">
          <g class="s2-squash"><use href="#trail-star" xlink:href="#trail-star" class="s2-color" /></g>
          <use href="#main-star" xlink:href="#main-star" class="s2-color" />
        </g>
      </g>
      <!-- S3 -->
      <g class="s3-pos">
        <g class="s3-scale">
          <g class="s3-squash"><use href="#trail-star" xlink:href="#trail-star" class="s3-color" /></g>
          <use href="#main-star" xlink:href="#main-star" class="s3-color" />
        </g>
      </g>
    </g>

    <!-- 背景渐变透明蒙版 -->
    <mask id="stars-alpha-matte" mask-type="alpha" style="mask-type: alpha">
      <use href="#all-animated-stars" xlink:href="#all-animated-stars" />
    </mask>
  </defs>

  <!-- 1. 底层：呈现动态压扁跳跃的主干星星层 -->
  <use href="#all-animated-stars" xlink:href="#all-animated-stars" />

  <!-- 2. 顶层：被星星遮罩裁切后的彩色滚动图层 -->
  <g class="grad-opacity" mask="url(#stars-alpha-matte)">
    <g class="grad-scroll">
      <rect x="0" y="0" width="384" height="108" fill="url(#iridescent-grad)"/>
    </g>
  </g>
</svg>