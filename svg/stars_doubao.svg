<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 160 160" width="100%" height="100%">
  <defs>
    <style>
      <![CDATA[
      /* 1. Reset */
      g { transform-origin: 0 0; }
      :root { --duration: 3.5s; } /* Total duration: (105 - 0)/30 = 3.5s */
      
      /* 2. Keyframes for Subtract 17 (Scale + Position) */
      @keyframes anim-subtract17-scale {
        13.33% { transform: scale(0.3, 0.3); } /* (40-0)/105*100 ≈13.33% */
        15.83% { transform: scale(0.6, 0.6); } /* (47.5-0)/105*100≈15.83% */
        18.33% { transform: scale(0.3, 0.3); } /* (55-0)/105*100≈18.33% */
      }
      @keyframes anim-subtract17-position {
        13.33% { transform: translate(46.5px, 22px); }
        15.83% { transform: translate(61.5px, 13.25px); }
        19.33% { transform: translate(45.062px, 22.812px); } /* (59-0)/105*100≈19.33% */
        23.50% { transform: translate(47.125px, 21.625px); } /* (70.5-0)/105*100≈23.50% */
        25.33% { transform: translate(46.5px, 22px); } /* (76-0)/105*100≈25.33% */
      }
      
      /* 3. Keyframes for Subtract 14 (Scale) */
      @keyframes anim-subtract14-scale {
        13.33% { transform: scale(1, 1); }
        15.83% { transform: scale(0.22, 1); }
        18.33% { transform: scale(1, 1); }
      }
      
      /* 4. Keyframes for Subtract 18 (Scale + Position) */
      @keyframes anim-subtract18-scale {
        7.50% { transform: scale(0.6, 0.6); } /* (22.5-0)/105*100≈7.50% */
        10.00% { transform: scale(0.82, 0.82); } /* (30-0)/105*100≈10.00% */
        12.50% { transform: scale(0.6, 0.6); } /* (37.5-0)/105*100≈12.50% */
        17.50% { transform: scale(0.6, 0.6); } /* (52.5-0)/105*100≈17.50% */
        20.00% { transform: scale(0.7, 0.7); } /* (60-0)/105*100≈20.00% */
        22.50% { transform: scale(0.6, 0.6); } /* (67.5-0)/105*100≈22.50% */
      }
      @keyframes anim-subtract18-position {
        7.50% { transform: translate(29px, 36px); }
        10.00% { transform: translate(10.75px, 25.75px); }
        13.67% { transform: translate(31.375px, 37.75px); } /* (41-0)/105*100≈13.67% */
        16.83% { transform: translate(29px, 36px); } /* (50.5-0)/105*100≈16.83% */
        17.50% { transform: translate(29px, 36px); }
        20.00% { transform: translate(20px, 29.75px); }
        23.83% { transform: translate(31.625px, 37.625px); } /* (71.5-0)/105*100≈23.83% */
        28.33% { transform: translate(29px, 36px); } /* (85-0)/105*100≈28.33% */
      }
      
      /* 5. Keyframes for Subtract 15 (Scale) */
      @keyframes anim-subtract15-scale {
        7.50% { transform: scale(1, 1); }
        10.00% { transform: scale(0.27, 1); }
        12.50% { transform: scale(1, 1); }
        17.50% { transform: scale(1, 1); }
        20.00% { transform: scale(0.27, 1); }
        22.50% { transform: scale(1, 1); }
      }
      
      /* 6. Keyframes for Subtract 19 (Scale + Position) */
      @keyframes anim-subtract19-scale {
        2.50% { transform: scale(1, 1); } /* (7.5-0)/105*100≈2.50% */
        5.00% { transform: scale(1.19, 1.19); } /* (15-0)/105*100≈5.00% */
        7.50% { transform: scale(1, 1); } /* (22.5-0)/105*100≈7.50% */
        12.50% { transform: scale(1, 1); } /* (37.5-0)/105*100≈12.50% */
        15.00% { transform: scale(1.08, 1.08); } /* (45-0)/105*100≈15.00% */
        17.50% { transform: scale(1, 1); } /* (52.5-0)/105*100≈17.50% */
      }
      @keyframes anim-subtract19-position {
        2.50% { transform: translate(50px, 53.5px); }
        5.00% { transform: translate(69.938px, 65.562px); }
        8.67% { transform: translate(46.75px, 51.125px); } /* (26.5-0)/105*100≈8.67% */
        11.67% { transform: translate(50px, 53.5px); } /* (35-0)/105*100≈11.67% */
        12.50% { transform: translate(50px, 53.5px); }
        15.00% { transform: translate(61.438px, 60.938px); }
        18.67% { transform: translate(48.25px, 52.188px); } /* (57-0)/105*100≈18.67% */
        23.17% { transform: translate(50px, 53.5px); } /* (69.5-0)/105*100≈23.17% */
      }
      
      /* 7. Keyframes for Subtract 16 (Scale) */
      @keyframes anim-subtract16-scale {
        2.50% { transform: scale(1, 1); }
        4.67% { transform: scale(0.77, 1); } /* (14.5-0)/105*100≈4.67% */
        5.00% { transform: scale(0.77, 1); } /* (15.5-0)/105*100≈5.00% */
        7.50% { transform: scale(1, 1); }
        12.50% { transform: scale(1, 1); }
        15.00% { transform: scale(0.23, 1); }
        17.50% { transform: scale(1, 1); }
      }
      
      /* 8. Keyframes for 光晕 (Position + Opacity) */
      @keyframes anim-guangyun-position {
        0% { transform: translate(0px, 540px); }
        15.00% { transform: translate(1920px, 540px); } /* (45-0)/105*100≈15.00% */
        15.38% { transform: translate(0px, 540px); } /* (46.125-0)/105*100≈15.38% */
        30.00% { transform: translate(1920px, 540px); } /* (90-0)/105*100≈30.00% */
      }
      @keyframes anim-guangyun-opacity {
        15.00% { opacity: 0; }
        17.50% { opacity: 1; } /* (52.5-0)/105*100≈17.50% */
        30.50% { opacity: 1; } /* (91.5-0)/105*100≈30.50% */
        34.83% { opacity: 0; } /* (104.5-0)/105*100≈34.83% */
      }
      
      /* 9. Keyframes for Fill Colors */
      @keyframes anim-fill17-color {
        13.33% { fill: rgb(218, 202, 251); } /* 0.8549,0.7922,0.9843 */
        15.83% { fill: rgb(131, 80, 240); } /* 0.5137,0.3137,0.949 */
        18.33% { fill: rgb(218, 202, 251); }
      }
      @keyframes anim-fill18-color {
        7.50% { fill: rgb(181, 150, 247); } /* 0.7098,0.5882,0.9686 */
        10.00% { fill: rgb(131, 80, 240); }
        12.50% { fill: rgb(181, 150, 247); }
        17.50% { fill: rgb(181, 150, 247); }
        20.00% { fill: rgb(131, 80, 240); }
        22.50% { fill: rgb(181, 150, 247); }
      }
      @keyframes anim-fill19-color {
        0% { fill: rgb(131, 80, 240); }
        2.50% { fill: rgb(131, 80, 240); }
        7.50% { fill: rgb(131, 80, 240); }
        12.50% { fill: rgb(131, 80, 240); }
        15.00% { fill: rgb(181, 150, 247); }
        17.50% { fill: rgb(131, 80, 240); }
      }
      
      /* 10. Animation Classes */
      .anim-subtract17-scale { animation: anim-subtract17-scale var(--duration) cubic-bezier(0.333, 0, 0.667, 1) linear forwards; }
      .anim-subtract17-position { animation: anim-subtract17-position var(--duration) cubic-bezier(0.333, 0.178, 0.667, 1) linear forwards; }
      .anim-subtract14-scale { animation: anim-subtract14-scale var(--duration) cubic-bezier(0.693, 0, 0.667, 1) linear forwards; }
      .anim-subtract18-scale { animation: anim-subtract18-scale var(--duration) cubic-bezier(0.333, 0, 0.667, 1) linear forwards; }
      .anim-subtract18-position { animation: anim-subtract18-position var(--duration) cubic-bezier(0.333, 0.315, 0.428, 1) linear forwards; }
      .anim-subtract15-scale { animation: anim-subtract15-scale var(--duration) cubic-bezier(1, 0, 0.667, 1) linear forwards; }
      .anim-subtract19-scale { animation: anim-subtract19-scale var(--duration) cubic-bezier(0.333, 0, 0.667, 1) linear forwards; }
      .anim-subtract19-position { animation: anim-subtract19-position var(--duration) cubic-bezier(0.333, 0.361, 0.521, 1) linear forwards; }
      .anim-subtract16-scale { animation: anim-subtract16-scale var(--duration) cubic-bezier(0.333, 0, 0.667, 1) linear forwards; }
      .anim-guangyun-position { animation: anim-guangyun-position var(--duration) cubic-bezier(0.167, 0.167, 0.833, 0.833) linear forwards; }
      .anim-guangyun-opacity { animation: anim-guangyun-opacity var(--duration) cubic-bezier(0.333, 0, 0.667, 1) linear forwards; }
      .anim-fill17-color { animation: anim-fill17-color var(--duration) cubic-bezier(0.333, 0, 0.667, 1) linear forwards; }
      .anim-fill18-color { animation: anim-fill18-color var(--duration) cubic-bezier(0.333, 0, 0.667, 1) linear forwards; }
      .anim-fill19-color { animation: anim-fill19-color var(--duration) cubic-bezier(0.333, 0, 0.833, 1) linear forwards; }
      ]]>
    </style>
    
    <!-- 3. Static Paths -->
    <path id="path-subtract17" d="M1.17,-18.106 C0,-19.25 -1.171,-18.105 -1.69,-15.478 C-3.173,-7.957 -6.375,0 -3.173,7.957 C-1.69,15.478 -1.171,18.104 0,19.25 C1.17,18.105 1.69,15.478 3.173,7.957 C6.375,0 3.173,-7.957 1.69,-15.478 Z" />
    <path id="path-subtract14" d="M1.403,-18.106 C0,-19.25 -1.405,-18.105 -2.027,-15.478 C-4.443,-7.957 -7.953,-4.446 -15.473,-2.028 C-18.105,-1.404 -19.25,0 -18.106,1.403 C-15.473,2.028 -7.953,4.446 -4.443,7.957 C-2.027,15.478 -1.405,18.104 0,19.25 C1.404,18.105 2.027,15.478 4.443,7.957 C7.953,4.446 15.473,2.028 18.105,1.403 C19.25,0 18.103,-1.405 15.473,-2.028 C7.953,-4.446 4.443,-7.957 2.027,-15.478 Z" />
    
    <!-- 4. Gradient for 光晕 -->
    <linearGradient id="gradient-guangyun" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(109, 109, 247, 1)" />
      <stop offset="12.39%" stop-color="rgba(31, 232, 223, 1)" />
      <stop offset="24.77%" stop-color="rgba(161, 161, 255, 1)" />
      <stop offset="38.07%" stop-color="rgba(31, 232, 223, 1)" />
      <stop offset="63.76%" stop-color="rgba(31, 232, 223, 1)" />
      <stop offset="75.69%" stop-color="rgba(161, 161, 255, 1)" />
      <stop offset="88.07%" stop-color="rgba(31, 232, 223, 1)" />
      <stop offset="100%" stop-color="rgba(109, 109, 247, 1)" />
    </linearGradient>
    
    <!-- 5. Reusable Animated Groups & Masks -->
    <g id="animated-subtract17">
      <g class="anim-subtract17-position">
        <g class="anim-subtract17-scale">
          <use href="#path-subtract17" xlink:href="#path-subtract17" class="anim-fill17-color" />
        </g>
      </g>
    </g>
    
    <g id="animated-subtract14">
      <g class="anim-subtract14-scale">
        <use href="#path-subtract14" xlink:href="#path-subtract14" class="anim-fill17-color" />
      </g>
    </g>
    
    <g id="animated-subtract18">
      <g class="anim-subtract18-position">
        <g class="anim-subtract18-scale">
          <use href="#path-subtract17" xlink:href="#path-subtract17" class="anim-fill18-color" />
        </g>
      </g>
    </g>
    
    <g id="animated-subtract15">
      <g class="anim-subtract15-scale">
        <use href="#path-subtract14" xlink:href="#path-subtract14" class="anim-fill18-color" />
      </g>
    </g>
    
    <g id="animated-subtract19">
      <g class="anim-subtract19-position">
        <g class="anim-subtract19-scale">
          <use href="#path-subtract17" xlink:href="#path-subtract17" class="anim-fill19-color" />
        </g>
      </g>
    </g>
    
    <g id="animated-subtract16">
      <g class="anim-subtract16-scale">
        <use href="#path-subtract14" xlink:href="#path-subtract14" class="anim-fill19-color" />
      </g>
    </g>
    
    <g id="animated-guangyun">
      <rect x="0" y="0" width="3840" height="1080" fill="url(#gradient-guangyun)" class="anim-guangyun-position anim-guangyun-opacity" />
    </g>
    
    <!-- Alpha Mask for 光晕 layer (tt:1) -->
    <mask id="alpha-mask-guangyun" style="mask-type: alpha">
      <g transform="scale(0.1, 0.1) translate(45px, 45px)">
        <use href="#animated-subtract17" xlink:href="#animated-subtract17" />
        <use href="#animated-subtract14" xlink:href="#animated-subtract14" />
        <use href="#animated-subtract18" xlink:href="#animated-subtract18" />
        <use href="#animated-subtract15" xlink:href="#animated-subtract15" />
        <use href="#animated-subtract19" xlink:href="#animated-subtract19" />
        <use href="#animated-subtract16" xlink:href="#animated-subtract16" />
      </g>
    </mask>
  </defs>

  <!-- 5. Render Layers (Bottom to Top) -->
  <!-- Main Container: scale(0.4445, 0.4445) translate(80px,80px) -->
  <g transform="translate(80px, 80px) scale(0.4445, 0.4445)">
    <!-- AI星c Group: translate(50px,50px) scale(1,1) -->
    <g transform="translate(50px, 50px)">
      <!-- Subtract Layers -->
      <use href="#animated-subtract17" xlink:href="#animated-subtract17" />
      <use href="#animated-subtract14" xlink:href="#animated-subtract14" />
      <use href="#animated-subtract18" xlink:href="#animated-subtract18" />
      <use href="#animated-subtract15" xlink:href="#animated-subtract15" />
      <use href="#animated-subtract19" xlink:href="#animated-subtract19" />
      <use href="#animated-subtract16" xlink:href="#animated-subtract16" />
      
      <!-- 光晕 Layer with Alpha Mask -->
      <g mask="url(#alpha-mask-guangyun)" transform="scale(0.1) translate(45px, 45px)">
        <use href="#animated-guangyun" xlink:href="#animated-guangyun" />
      </g>
    </g>
  </g>
</svg>