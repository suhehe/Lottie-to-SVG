<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Lottie to Native SVG Compiler V2</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #1e1e1e; color: #fff; }
        .container { max-width: 1200px; margin: 0 auto; }
        .upload-area { border: 2px dashed #4f46e5; padding: 40px; text-align: center; border-radius: 8px; background: #2d2d2d; cursor: pointer; transition: 0.3s; margin-bottom: 20px;}
        .upload-area:hover { background: #3d3d3d; border-color: #818cf8; }
        .panels { display: flex; gap: 20px; height: 60vh; }
        .panel { flex: 1; display: flex; flex-direction: column; }
        textarea { flex: 1; font-family: 'Courier New', Courier, monospace; font-size: 12px; padding: 10px; background: #2d2d2d; color: #a5b4fc; border: 1px solid #444; border-radius: 6px; resize: none;}
        .preview { background: #fff; border-radius: 6px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        button { background: #4f46e5; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; margin-top: 10px; }
        button:hover { background: #4338ca; }
    </style>
</head>
<body>

<div class="container">
    <h2>🧩 Lottie to Pure SVG Compiler (V2 Core)</h2>
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <h3>点击或拖拽上传 Lottie JSON 文件</h3>
        <input type="file" id="fileInput" accept=".json" style="display: none;" onchange="handleFileSelect(event)">
    </div>

    <button id="downloadBtn" style="display:none;" onclick="downloadSVG()">⬇️ 导出独立 SVG</button>

    <div class="panels">
        <div class="panel">
            <h4>SVG 预览</h4>
            <div id="preview" class="preview"></div>
        </div>
        <div class="panel">
            <h4>源代码</h4>
            <textarea id="output" readonly placeholder="解析后的代码将在此显示..."></textarea>
        </div>
    </div>
</div>

<script>
    let globalAssets = {};
    let globalFPS = 30;
    let globalDuration = 0;
    let cssStyles = '';
    let defsHTML = '';
    let idCounter = 0;

    function getUID(prefix) { return `${prefix}_${idCounter++}`; }

    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            const data = JSON.parse(e.target.result);
            compileLottie(data);
        };
        reader.readAsText(file);
    }

    function compileLottie(data) {
        globalFPS = data.fr || 30;
        const totalFrames = data.op - data.ip;
        globalDuration = (totalFrames / globalFPS).toFixed(3);
        
        // 1. 建立资源库 (Precomps)
        globalAssets = {};
        if (data.assets) {
            data.assets.forEach(asset => globalAssets[asset.id] = asset);
        }

        cssStyles = `/* Auto-generated by Compiler */\n:root { --dur: ${globalDuration}s; }\ng { transform-origin: 0 0; }\n`;
        defsHTML = '';

        // 2. 递归解析主图层
        let bodyHTML = parseLayers(data.layers.reverse());

        // 3. 组装最终 SVG
        const finalSVG = `<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 ${data.w} ${data.h}" width="100%" height="100%">
  <defs>
    <style>\n<![CDATA[\n${cssStyles}\n]]>\n    </style>
    ${defsHTML}
  </defs>
  ${bodyHTML}
</svg>`;

        document.getElementById('output').value = finalSVG;
        document.getElementById('preview').innerHTML = finalSVG;
        document.getElementById('downloadBtn').style.display = 'inline-block';
    }

    // --- 核心：递归图层解析器 ---
    function parseLayers(layers) {
        let html = '';
        let pendingMaskId = null;

        layers.forEach((layer) => {
            const layerId = getUID('lyr');
            let layerContent = '';

            // 处理动画关键帧 (Transforms)
            if (layer.ks) {
                const transformCSS = parseTransforms(layerId, layer.ks);
                if (transformCSS) cssStyles += transformCSS;
            }

            // 预合成图层 (Precomp)
            if (layer.ty === 0 && layer.refId && globalAssets[layer.refId]) {
                const precompLayers = globalAssets[layer.refId].layers.reverse();
                layerContent = parseLayers(precompLayers);
            } 
            // 形状图层 (Shape)
            else if (layer.ty === 4 && layer.shapes) {
                layerContent = parseShapes(layer.shapes);
            }

            // 处理 Alpha 轨道遮罩 (Track Matte)
            let maskAttr = '';
            if (pendingMaskId) {
                maskAttr = ` mask="url(#${pendingMaskId})"`;
                pendingMaskId = null; // 消费掉遮罩
            }

            // 如果当前层是遮罩层 (tt: 1)
            if (layer.tt === 1 || layer.tt === 2) {
                const maskId = getUID('mask');
                defsHTML += `\n<mask id="${maskId}" style="mask-type: alpha;">\n  <g class="${layerId}">\n    ${layerContent}\n  </g>\n</mask>`;
                pendingMaskId = maskId; // 留给下一个图层使用
            } else {
                // 普通渲染层
                html += `\n  <g class="${layerId}"${maskAttr}>\n    ${layerContent}\n  </g>`;
            }
        });
        return html;
    }

    // --- 核心：形状与路径绘制器 ---
    function parseShapes(shapes) {
        let svg = '';
        shapes.forEach(shape => {
            if (shape.ty === 'gr') {
                svg += `<g>\n${parseShapes(shape.it)}\n</g>`;
            } else if (shape.ty === 'sh') {
                // 转换 Lottie 路径到 SVG d 属性
                const pathData = shape.ks.k;
                let d = '';
                if (pathData.v && pathData.v.length > 0) {
                    d = `M ${pathData.v[0][0]} ${pathData.v[0][1]}`;
                    for (let i = 1; i < pathData.v.length; i++) {
                        d += ` C ${pathData.v[i-1][0] + pathData.o[i-1][0]} ${pathData.v[i-1][1] + pathData.o[i-1][1]}, ` +
                             `${pathData.v[i][0] + pathData.i[i][0]} ${pathData.v[i][1] + pathData.i[i][1]}, ` +
                             `${pathData.v[i][0]} ${pathData.v[i][1]}`;
                    }
                    if (pathData.c) { // Closed path
                        const last = pathData.v.length - 1;
                        d += ` C ${pathData.v[last][0] + pathData.o[last][0]} ${pathData.v[last][1] + pathData.o[last][1]}, ` +
                             `${pathData.v[0][0] + pathData.i[0][0]} ${pathData.v[0][1] + pathData.i[0][1]}, ` +
                             `${pathData.v[0][0]} ${pathData.v[0][1]} Z`;
                    }
                }
                svg += `<path d="${d}" />\n`;
            } else if (shape.ty === 'fl') {
                // 纯色填充
                const color = shape.c.k;
                if(Array.isArray(color) && color.length >= 3){
                    const r = Math.round(color[0]*255), g = Math.round(color[1]*255), b = Math.round(color[2]*255);
                    svg += `<style> path { fill: rgb(${r},${g},${b}); } </style>\n`;
                }
            } else if (shape.ty === 'gf') {
                // 渐变填充 (占位符，完整渐变需解析 stops)
                svg += `<style> path { fill: url(#iridescent-grad); } </style>\n`;
            }
        });
        return svg;
    }

    // --- 核心：CSS @keyframes 生成器 ---
    function parseTransforms(layerId, ks) {
        let css = '';
        let hasAnim = false;
        let staticTransform = '';

        // 解析位置 (Position)
        if (ks.p && ks.p.a === 1) {
            hasAnim = true;
            css += `@keyframes p_${layerId} {\n`;
            ks.p.k.forEach(kf => {
                if(!kf.s || kf.t == null) return;
                const pct = ((kf.t / (globalDuration * globalFPS)) * 100).toFixed(2);
                let ease = 'linear';
                if(kf.i && kf.o) ease = `cubic-bezier(${kf.o.x[0]}, ${kf.o.y[0]}, ${kf.i.x[0]}, ${kf.i.y[0]})`;
                css += `  ${pct}% { transform: translate(${kf.s[0]}px, ${kf.s[1]}px); animation-timing-function: ${ease}; }\n`;
            });
            css += `}\n.${layerId} { animation: p_${layerId} var(--dur) infinite; }\n`;
        } else if (ks.p && ks.p.k) {
            staticTransform += `translate(${ks.p.k[0]}px, ${ks.p.k[1]}px) `;
        }

        // 解析缩放 (Scale) - 逻辑同上，为简化代码此处处理静态
        if (ks.s && ks.s.a === 0) {
            staticTransform += `scale(${ks.s.k[0]/100}, ${ks.s.k[1]/100}) `;
        }

        if(!hasAnim && staticTransform) {
            css += `.${layerId} { transform: ${staticTransform}; }\n`;
        }

        return css;
    }

    function downloadSVG() {
        const svgContent = document.getElementById('output').value;
        const blob = new Blob([svgContent], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'compiled-animation.svg';
        a.click();
    }
</script>
</body>
</html>
