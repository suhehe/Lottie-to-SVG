<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Lottie 100% 特性 SVG 转换器 (V4 终极版)</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 40px; background: #0f172a; color: #f8fafc; text-align: center; }
        .container { max-width: 800px; margin: 0 auto; background: #1e293b; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .upload-area { border: 2px dashed #6366f1; padding: 60px 20px; border-radius: 12px; background: #312e81; cursor: pointer; transition: 0.3s; }
        .upload-area:hover { background: #3730a3; border-color: #818cf8; transform: scale(1.02); }
        .status { margin-top: 20px; font-size: 14px; color: #94a3b8; min-height: 20px; }
        button { background: #10b981; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 20px; font-weight: bold; display: none; transition: 0.3s; }
        button:hover { background: #059669; }
    </style>
</head>
<body>

<div class="container">
    <h2>✨ Lottie to Smart SVG Packager (V4 终极版)</h2>
    <p style="color:#94a3b8; margin-bottom: 30px;">彻底解决拖入浏览器空白问题，利用 iframe + Base64 黑科技完美隔离</p>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <h3 style="margin:0;">📥 点击上传 Lottie JSON 文件</h3>
        <input type="file" id="fileInput" accept=".json" style="display: none;" onchange="processFile(event)">
    </div>

    <div id="status" class="status">等待上传...</div>
    <button id="downloadBtn" onclick="downloadSVG()">⬇️ 下载 100% 还原的独立 SVG 文件</button>
</div>

<script>
    let generatedSVGString = '';
    // 使用完整版 lottie-web，确保没有任何特性遗漏
    const LOTTIE_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js';
    let lottieScriptContent = '';

    fetch(LOTTIE_CDN)
        .then(res => res.text())
        .then(text => { lottieScriptContent = text; })
        .catch(err => { document.getElementById('status').innerText = "⚠️ 无法加载 Lottie 核心库，请检查网络"; });

    function processFile(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        document.getElementById('status').innerText = `正在解析 ${file.name}...`;

        reader.onload = function(e) {
            try {
                const lottieJSON = JSON.parse(e.target.result);
                buildSmartSVG(lottieJSON, file.name);
            } catch (err) {
                document.getElementById('status').innerText = "❌ 解析失败，请确保是有效的 JSON 文件";
            }
        };
        reader.readAsText(file);
    }

    function buildSmartSVG(jsonData, filename) {
        if (!lottieScriptContent) {
            alert("正在加载核心引擎，请稍等一秒后重试");
            return;
        }

        const width = jsonData.w || 500;
        const height = jsonData.h || 500;

        // 1. 构建要放进 iframe 里的纯净 HTML 文档
        const innerHTML = `<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
  #lottie-player { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
</style>
</head>
<body>
  <div id="lottie-player"></div>
  <script>${lottieScriptContent}<\/script>
  <script>
    var animationData = ${JSON.stringify(jsonData)};
    lottie.loadAnimation({
      container: document.getElementById('lottie-player'),
      renderer: 'svg', // 这里依然使用 svg 渲染器以保证高清
      loop: true,
      autoplay: true,
      animationData: animationData
    });
  <\/script>
</body>
</html>`;

        // 2. 将整个 HTML 转为 Base64 编码，防止任何转义错误
        // 注意：为避免中文编码报错，这里使用 encodeURIComponent + unescape
        const base64HTML = btoa(unescape(encodeURIComponent(innerHTML)));
        const dataURI = `data:text/html;base64,${base64HTML}`;

        // 3. 构建外层 SVG，使用 foreignObject 嵌套 iframe 加载上面的 Data URI
        generatedSVGString = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${width} ${height}" width="100%" height="100%">
  <foreignObject width="100%" height="100%">
    <html xmlns="http://www.w3.org/1999/xhtml" style="width:100%; height:100%; margin:0; padding:0;">
      <body style="width:100%; height:100%; margin:0; padding:0; overflow:hidden; background:transparent;">
        <iframe src="${dataURI}" style="width:100%; height:100%; border:none; margin:0; padding:0; overflow:hidden; background:transparent;"></iframe>
      </body>
    </html>
  </foreignObject>
</svg>`;

        document.getElementById('status').innerText = `✅ 转换成功！拖入浏览器立即可见。`;
        document.getElementById('downloadBtn').style.display = 'inline-block';
        document.getElementById('downloadBtn').dataset.filename = filename.replace('.json', '.svg');
    }

    function downloadSVG() {
        const blob = new Blob([generatedSVGString], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = document.getElementById('downloadBtn').dataset.filename || 'smart-lottie.svg';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
</script>
</body>
</html>
