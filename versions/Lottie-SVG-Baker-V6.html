<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Lottie to Pure SVG Baker (V6 - 完美矩阵与形变支持)</title>
    <!-- 引入 Lottie 用于幕后解析和生成初始 DOM -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #0f172a; color: #e2e8f0; }
        .container { max-width: 1000px; margin: 0 auto; background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .upload-area { border: 2px dashed #6366f1; padding: 40px; text-align: center; border-radius: 12px; background: #312e81; cursor: pointer; transition: 0.3s; margin-bottom: 20px;}
        .upload-area:hover { background: #3730a3; border-color: #818cf8; }
        .settings { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; background: #0f172a; padding: 15px; border-radius: 8px;}
        .settings input { width: 60px; padding: 5px; text-align: center; border-radius: 4px; border: 1px solid #475569; background: #1e293b; color: white;}
        #progress-container { width: 100%; height: 6px; background: #334155; border-radius: 3px; overflow: hidden; margin-bottom: 20px; }
        #progress-bar { width: 0%; height: 100%; background: #10b981; transition: 0.1s; }
        button { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold; display: none;}
        button:hover { background: #059669; }
        textarea { width: 100%; height: 300px; margin-top: 15px; font-family: monospace; font-size: 12px; background: #0f172a; color: #a5b4fc; border: 1px solid #334155; padding: 10px; border-radius: 8px; box-sizing: border-box; white-space: pre;}
        /* 隐藏幕后 Lottie 渲染沙盒 */
        #hidden-lottie { position: absolute; left: -9999px; top: -9999px; width: 1000px; height: 1000px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔥 Lottie to Pure SVG Baker (V6 终极版)</h2>
    <p style="color:#94a3b8; font-size: 14px;">解决矩阵继承、轨道遮罩、颜色渐变，并通过 SMIL 支持对称路径形变，输出 100% 纯净 SVG。</p>

    <div class="settings">
        <label title="推荐: 1 (最高精度), 2 (平衡), 5 (极小体积)">
            <b>烘焙采样步长 (帧):</b> 
            <input type="number" id="bakeStep" value="1" min="1" max="10">
        </label>
        <span style="font-size: 12px; color: #64748b;">* 步长为1可完美还原所有贝塞尔弧线和形变细节</span>
    </div>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <h3 id="upload-text">📥 点击上传 Lottie JSON 文件</h3>
        <input type="file" id="fileInput" accept=".json" style="display: none;" onchange="handleFileSelect(event)">
    </div>

    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="status" style="margin-bottom: 20px; color: #10b981; font-weight: bold;"></div>

    <button id="downloadBtn" onclick="downloadSVG()">⬇️ 下载原生 SVG 文件</button>
    <textarea id="output" readonly placeholder="烘焙后的 SVG 源码将在此显示..."></textarea>
</div>

<div id="hidden-lottie"></div>

<script>
    let finalSVGString = '';
    let currentAnim = null;

    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;

        document.getElementById('upload-text').innerText = `正在处理: ${file.name}`;
        document.getElementById('progress-bar').style.width = '0%';
        document.getElementById('output').value = '';
        document.getElementById('downloadBtn').style.display = 'none';

        const reader = new FileReader();
        reader.onload = (e) => {
            const lottieData = JSON.parse(e.target.result);
            startBakingProcess(lottieData, file.name);
        };
        reader.readAsText(file);
    }

    function startBakingProcess(animationData, filename) {
        const container = document.getElementById('hidden-lottie');
        container.innerHTML = ''; 
        
        currentAnim = lottie.loadAnimation({
            container: container,
            renderer: 'svg',
            loop: false,
            autoplay: false,
            animationData: animationData
        });

        currentAnim.addEventListener('DOMLoaded', () => {
            bakeAnimation(filename);
        });
    }

    async function bakeAnimation(filename) {
        const bakeStep = parseInt(document.getElementById('bakeStep').value) || 1;
        const totalFrames = currentAnim.totalFrames;
        const fps = currentAnim.frameRate;
        const duration = (totalFrames / fps).toFixed(3);
        const svgNode = document.querySelector('#hidden-lottie svg');
        
        // 1. 获取所有需要跟踪的节点 (包含 mask 里面的)
        const trackableElements = svgNode.querySelectorAll('g, path, rect, ellipse, stop');
        const trackingData = new Map();

        trackableElements.forEach((el, index) => {
            const id = `el_${index}`;
            el.setAttribute('data-id', id);
            trackingData.set(id, { 
                element: el, 
                tagName: el.tagName.toLowerCase(),
                frames: [] 
            });
        });

        const statusEl = document.getElementById('status');
        
        // 2. 核心烘焙：虚拟播放头逐帧扫描 DOM
        for (let frame = 0; frame <= totalFrames; frame += bakeStep) {
            // 强行渲染当前帧
            currentAnim.goToAndStop(frame, true);
            const percentage = ((frame / totalFrames) * 100).toFixed(2);
            const keyTime = (frame / totalFrames).toFixed(4); // 用于 SMIL
            
            trackableElements.forEach(el => {
                const id = el.getAttribute('data-id');
                const state = {
                    pct: percentage,
                    keyTime: keyTime,
                    transform: el.getAttribute('transform') || '',
                    opacity: el.getAttribute('opacity') || el.style.opacity || '',
                    fill: el.getAttribute('fill') || el.style.fill || '',
                    stroke: el.getAttribute('stroke') || el.style.stroke || '',
                    stopColor: el.getAttribute('stop-color') || el.style.stopColor || '',
                    d: el.getAttribute('d') || '' // 用于 Path 形变
                };
                trackingData.get(id).frames.push(state);
            });

            document.getElementById('progress-bar').style.width = `${percentage}%`;
            statusEl.innerText = `正在烘焙 DOM 关键帧... ${percentage}%`;
            await new Promise(r => setTimeout(r, 0)); 
        }

        // 为了保证完美循环，把第0帧的数据强行塞入100%帧
        trackableElements.forEach(el => {
            const id = el.getAttribute('data-id');
            const data = trackingData.get(id);
            if(data.frames.length > 0 && data.frames[data.frames.length - 1].pct !== "100.00") {
                const lastFrame = Object.assign({}, data.frames[0]);
                lastFrame.pct = "100.00";
                lastFrame.keyTime = "1.0000";
                data.frames.push(lastFrame);
            }
        });

        statusEl.innerText = `正在生成 CSS & SMIL 代码...`;
        
        let cssString = `/* Lottie Pure SVG Baked */\n:root { --dur: ${duration}s; }\ng { transform-origin: 0 0; }\n`;
        
        // 3. 比较差异并生成动画代码
        trackingData.forEach((data, id) => {
            const frames = data.frames;
            const f0 = frames[0];
            
            // 检查常规 CSS 属性能否做动画
            const hasCssAnim = frames.some(f => 
                f.transform !== f0.transform || f.opacity !== f0.opacity || 
                f.fill !== f0.fill || f.stopColor !== f0.stopColor
            );

            // 检查 d 属性 (Path 形变)
            const hasPathMorph = data.tagName === 'path' && frames.some(f => f.d !== f0.d);

            // 写入 CSS @keyframes
            if (hasCssAnim) {
                const animName = `a_${id}`;
                cssString += `.${id} { animation: ${animName} var(--dur) linear infinite; }\n`;
                cssString += `@keyframes ${animName} {\n`;
                
                let lastValidProps = '';
                frames.forEach(f => {
                    let props = '';
                    if (f.transform) props += `transform: ${f.transform}; `;
                    if (f.opacity !== '') props += `opacity: ${f.opacity}; `;
                    if (f.fill && f.fill.includes('rgb')) props += `fill: ${f.fill}; `;
                    if (f.stopColor) props += `stop-color: ${f.stopColor}; `;
                    
                    if (props && props !== lastValidProps) {
                        cssString += `  ${f.pct}% { ${props}}\n`;
                        lastValidProps = props;
                    }
                });
                cssString += `}\n`;
                data.element.classList.add(id);
            }

            // 写入 SMIL <animate> (专治路径形变)
            if (hasPathMorph) {
                let values = [];
                let keyTimes = [];
                
                frames.forEach(f => {
                    values.push(f.d);
                    keyTimes.push(f.keyTime);
                });

                const animateTag = document.createElementNS("http://www.w3.org/2000/svg", "animate");
                animateTag.setAttribute("attributeName", "d");
                animateTag.setAttribute("calcMode", "linear");
                animateTag.setAttribute("values", values.join('; '));
                animateTag.setAttribute("keyTimes", keyTimes.join('; '));
                animateTag.setAttribute("dur", `${duration}s`);
                animateTag.setAttribute("repeatCount", "indefinite");
                
                data.element.appendChild(animateTag);
            }
            
            // --- 4. 深度清理 DOM ---
            // 移除跟踪ID
            data.element.removeAttribute('data-id');
            
            // 核心清理：Lottie 为了渲染会往元素上写行内样式 (如 style="display:block; opacity:1")
            // 行内样式的优先级高于 CSS @keyframes，必须清除掉！否则 CSS 动画会失效。
            if (hasCssAnim) {
                data.element.removeAttribute('transform');
                data.element.style.removeProperty('transform');
                data.element.style.removeProperty('opacity');
            }
            // 不要移除默认 fill 和 d 属性，作为第0帧的托底
        });

        // 5. 注入 CSS
        svgNode.removeAttribute('style'); // 移除宽高的硬编码样式限制
        const defs = svgNode.querySelector('defs') || document.createElement('defs');
        const styleTag = document.createElement('style');
        styleTag.textContent = `\n/* <![CDATA[ */\n${cssString}\n/* ]]> */\n`;
        defs.prepend(styleTag);
        
        if (!svgNode.querySelector('defs')) {
            svgNode.prepend(defs);
        }

        // 6. 提取最终字符串
        finalSVGString = new XMLSerializer().serializeToString(svgNode);
        
        // 美化并输出
        document.getElementById('output').value = finalSVGString;
        const kbSize = (finalSVGString.length / 1024).toFixed(1);
        statusEl.innerText = `✅ 烘焙成功！获得无JS原生 SVG (体积: ${kbSize} KB)`;
        
        const btn = document.getElementById('downloadBtn');
        btn.style.display = 'inline-block';
        btn.dataset.filename = filename.replace('.json', '-pure.svg');
    }

    function downloadSVG() {
        const blob = new Blob([finalSVGString], { type: 'image/svg+xml' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = document.getElementById('downloadBtn').dataset.filename || 'baked-pure-animation.svg';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
</script>
</body>
</html>
